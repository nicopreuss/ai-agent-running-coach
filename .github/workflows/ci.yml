name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run tests
        run: poetry run pytest tests/

      - name: Lint with ruff
        run: poetry run ruff check .

      - name: Verify .env.example contains no real secrets
        run: |
          echo "Scanning .env.example for patterns that look like real secrets..."
          if grep -Ei '(sk-[A-Za-z0-9]{20,}|Bearer [A-Za-z0-9._-]+|password\s*=\s*\S+)' .env.example; then
            echo "ERROR: .env.example appears to contain a real secret. Remove it before merging."
            exit 1
          fi
          echo "No secret patterns detected."
